name: Bug report
description: Report a reproducible problem in Fleet.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Remove tokens, API keys, private logs, and customer data before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the shortest steps that reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Version or commit
      placeholder: "0.1.6 or git commit SHA"
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - macOS
        - Linux
        - Windows/WSL
        - Other
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste relevant redacted output from release or setup checks.
      render: shell
