name: Feature request
description: Suggest an improvement to the console, setup flow, or operator workflow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator workflow is hard, confusing, or missing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or different design you considered?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, environment details, or related issues. Remove secrets before sharing.
